services:
  postgres:
    build:
      context: ./postgresql
      dockerfile: Dockerfile
    container_name: postgres
    restart: always
    ports:
      - "5432:5432" # ホストからの開発用アクセスを許可
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - gateway

  neo4j:
    build:
      context: ./neo4j
      dockerfile: Dockerfile
    container_name: neo4j
    restart: always
    ports:
      - "7474:7474" # Neo4j Browser (HTTP)
      - "7687:7687" # Bolt Protocol (FastAPI接続用)
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_PLUGINS: '["apoc"]' # GraphRAG用のAPOCプラグインを自動導入
      TZ: ${TZ}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    networks:
      - gateway
    labels:
      - "traefik.enable=true"
      # /browser 自体の通常ルーティング
      - "traefik.http.routers.neo4j.rule=Host(`${DOMAIN}`) && PathPrefix(`/browser`)"
      - "traefik.http.routers.neo4j.entrypoints=web"
      - "traefik.http.services.neo4j.loadbalancer.server.port=7474"
      
      # /neo4j へのアクセスを /browser/ にリダイレクトする設定
      - "traefik.http.routers.neo4j-redirect.rule=Host(`${DOMAIN}`) && (Path(`/neo4j`) || PathPrefix(`/neo4j/`))"
      - "traefik.http.routers.neo4j-redirect.entrypoints=web"
      - "traefik.http.routers.neo4j-redirect.middlewares=neo4j-redirect-url"
      - "traefik.http.middlewares.neo4j-redirect-url.redirectregex.regex=^http://([^/]+)/neo4j(.*)$$"
      - "traefik.http.middlewares.neo4j-redirect-url.redirectregex.replacement=http://$$1/browser/"

volumes:
  postgres_data:
    name: postgres_data
  neo4j_data:
    name: neo4j_data
  neo4j_logs:
    name: neo4j_logs
  neo4j_import:
    name: neo4j_import
  neo4j_plugins:
    name: neo4j_plugins

networks:
  gateway:
    external: true
